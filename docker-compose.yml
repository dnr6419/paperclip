services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backtesting
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest -d backtesting"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      BACKTEST_DB_HOST: db
      BACKTEST_DB_PORT: "5432"
      BACKTEST_DB_NAME: backtesting
      BACKTEST_DB_USER: backtest
      BACKTEST_DB_PASSWORD: backtest
      ELK_HOST: ${ELK_HOST:-192.168.45.75}
      ELK_PORT: ${ELK_PORT:-9200}
      ELK_SCHEME: ${ELK_SCHEME:-https}
      ELK_USER: ${ELK_USER:-elastic}
      ELK_PASSWORD: ${ELK_PASSWORD:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
