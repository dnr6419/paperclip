services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backtesting
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest -d backtesting"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      BACKTEST_DB_HOST: db
      BACKTEST_DB_PORT: "5432"
      BACKTEST_DB_NAME: backtesting
      BACKTEST_DB_USER: backtest
      BACKTEST_DB_PASSWORD: backtest
      ELK_HOST: elasticsearch
      ELK_PORT: "9200"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  esdata:
